<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Китайские карточки HSK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #B22222 50%, #DC143C 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Китайские фонарики */
        .lantern {
            position: absolute;
            width: 60px;
            height: 80px;
            background: radial-gradient(ellipse at center, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: swing 3s ease-in-out infinite;
        }

        .lantern::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #8B0000;
            border-radius: 3px;
        }

        .lantern::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 20px;
            background: linear-gradient(to bottom, #FFD700, #FF8C00);
            border-radius: 0 0 4px 4px;
        }

        .lantern:nth-child(1) { top: 20px; left: 5%; animation-delay: 0s; }
        .lantern:nth-child(2) { top: 40px; right: 8%; animation-delay: 1s; }
        .lantern:nth-child(3) { top: 60px; left: 15%; animation-delay: 0.5s; }
        .lantern:nth-child(4) { top: 30px; right: 20%; animation-delay: 1.5s; }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: #FFD700;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .level-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: 2px solid #8B0000;
            border-radius: 25px;
            color: #8B0000;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .level-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .level-btn.active {
            background: linear-gradient(135deg, #8B0000, #B22222);
            color: #FFD700;
            border-color: #FFD700;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card {
            perspective: 1000px;
            height: 280px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 3px solid #8B0000;
        }

        .card-back {
            background: linear-gradient(135deg, #8B0000 0%, #B22222 100%);
            border: 3px solid #FFD700;
            transform: rotateY(180deg);
        }

        .hanzi {
            font-size: 4em;
            color: #8B0000;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .pinyin {
            font-size: 1.5em;
            color: #8B0000;
            font-style: italic;
        }

        .translation {
            font-size: 1.8em;
            color: #FFD700;
            text-align: center;
            font-weight: bold;
        }

        .card-back .pinyin {
            color: #FFD700;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .cards-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .card {
                height: 220px;
            }

            .hanzi {
                font-size: 3em;
            }

            .pinyin {
                font-size: 1.2em;
            }

            .translation {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="lantern"></div>
    <div class="lantern"></div>
    <div class="lantern"></div>
    <div class="lantern"></div>

    <div class="container">
        <h1>🏮 Китайские карточки HSK 🏮</h1>
        
        <div class="level-selector">
            <button class="level-btn active" data-level="1">HSK 1</button>
            <button class="level-btn" data-level="2">HSK 2</button>
            <button class="level-btn" data-level="3">HSK 3</button>
            <button class="level-btn" data-level="4">HSK 4</button>
        </div>

        <div class="cards-container" id="cardsContainer"></div>
    </div>

    <script>
        const words = {
            1: [
                { hanzi: '你', pinyin: 'nǐ', translation: 'ты' },
                { hanzi: '好', pinyin: 'hǎo', translation: 'хороший' },
                { hanzi: '我', pinyin: 'wǒ', translation: 'я' },
                { hanzi: '是', pinyin: 'shì', translation: 'быть' },
                { hanzi: '人', pinyin: 'rén', translation: 'человек' },
                { hanzi: '大', pinyin: 'dà', translation: 'большой' },
                { hanzi: '小', pinyin: 'xiǎo', translation: 'маленький' },
                { hanzi: '中', pinyin: 'zhōng', translation: 'середина' },
                { hanzi: '国', pinyin: 'guó', translation: 'страна' },
                { hanzi: '学', pinyin: 'xué', translation: 'учиться' },
                { hanzi: '生', pinyin: 'shēng', translation: 'студент' },
                { hanzi: '老', pinyin: 'lǎo', translation: 'старый' },
                { hanzi: '师', pinyin: 'shī', translation: 'учитель' },
                { hanzi: '朋', pinyin: 'péng', translation: 'друг' },
                { hanzi: '友', pinyin: 'yǒu', translation: 'приятель' }
            ],
            2: [
                { hanzi: '快', pinyin: 'kuài', translation: 'быстрый' },
                { hanzi: '慢', pinyin: 'màn', translation: 'медленный' },
                { hanzi: '高', pinyin: 'gāo', translation: 'высокий' },
                { hanzi: '兴', pinyin: 'xìng', translation: 'интерес' },
                { hanzi: '漂', pinyin: 'piào', translation: 'красивый' },
                { hanzi: '亮', pinyin: 'liàng', translation: 'яркий' },
                { hanzi: '便', pinyin: 'biàn', translation: 'удобный' },
                { hanzi: '宜', pinyin: 'yí', translation: 'подходящий' },
                { hanzi: '黑', pinyin: 'hēi', translation: 'чёрный' },
                { hanzi: '白', pinyin: 'bái', translation: 'белый' },
                { hanzi: '红', pinyin: 'hóng', translation: 'красный' },
                { hanzi: '黄', pinyin: 'huáng', translation: 'жёлтый' },
                { hanzi: '春', pinyin: 'chūn', translation: 'весна' },
                { hanzi: '夏', pinyin: 'xià', translation: 'лето' },
                { hanzi: '秋', pinyin: 'qiū', translation: 'осень' }
            ],
            3: [
                { hanzi: '环', pinyin: 'huán', translation: 'окружение' },
                { hanzi: '境', pinyin: 'jìng', translation: 'обстановка' },
                { hanzi: '文', pinyin: 'wén', translation: 'культура' },
                { hanzi: '化', pinyin: 'huà', translation: 'изменять' },
                { hanzi: '历', pinyin: 'lì', translation: 'история' },
                { hanzi: '史', pinyin: 'shǐ', translation: 'история' },
                { hanzi: '经', pinyin: 'jīng', translation: 'проходить' },
                { hanzi: '济', pinyin: 'jì', translation: 'экономика' },
                { hanzi: '科', pinyin: 'kē', translation: 'наука' },
                { hanzi: '技', pinyin: 'jì', translation: 'техника' },
                { hanzi: '发', pinyin: 'fā', translation: 'развивать' },
                { hanzi: '展', pinyin: 'zhǎn', translation: 'развернуть' },
                { hanzi: '社', pinyin: 'shè', translation: 'общество' },
                { hanzi: '会', pinyin: 'huì', translation: 'встреча' },
                { hanzi: '问', pinyin: 'wèn', translation: 'спрашивать' }
            ],
            4: [
                { hanzi: '复', pinyin: 'fù', translation: 'повторять' },
                { hanzi: '杂', pinyin: 'zá', translation: 'сложный' },
                { hanzi: '简', pinyin: 'jiǎn', translation: 'простой' },
                { hanzi: '单', pinyin: 'dān', translation: 'одиночный' },
                { hanzi: '成', pinyin: 'chéng', translation: 'становиться' },
                { hanzi: '功', pinyin: 'gōng', translation: 'успех' },
                { hanzi: '失', pinyin: 'shī', translation: 'терять' },
                { hanzi: '败', pinyin: 'bài', translation: 'поражение' },
                { hanzi: '胜', pinyin: 'shèng', translation: 'победа' },
                { hanzi: '利', pinyin: 'lì', translation: 'выгода' },
                { hanzi: '竞', pinyin: 'jìng', translation: 'соревноваться' },
                { hanzi: '争', pinyin: 'zhēng', translation: 'бороться' },
                { hanzi: '合', pinyin: 'hé', translation: 'объединять' },
                { hanzi: '作', pinyin: 'zuò', translation: 'работать' },
                { hanzi: '创', pinyin: 'chuàng', translation: 'создавать' }
            ]
        };

        let currentLevel = 1;

        function renderCards(level) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            words[level].forEach(word => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="hanzi">${word.hanzi}</div>
                            <div class="pinyin">${word.pinyin}</div>
                        </div>
                        <div class="card-back">
                            <div class="pinyin">${word.pinyin}</div>
                            <div class="translation">${word.translation}</div>
                        </div>
                    </div>
                `;
                
                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                });

                container.appendChild(card);
            });
        }

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentLevel = parseInt(e.target.dataset.level);
                renderCards(currentLevel);
            });
        });

        renderCards(currentLevel);
    </script>
</body>
</html>
